<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calcify — Premium Calculator</title>
    <meta name="description" content="Calcify — A beautifully crafted, premium dark-mode calculator with history, keyboard support, and smooth animations." />
    <meta name="theme-color" content="#0d0d18" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>

    <!-- animated background orbs -->
    <div class="bg-orbs" aria-hidden="true">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>

    <main class="app-shell">

      <!-- history sidebar -->
      <aside class="history-panel" id="history-panel" aria-label="Calculation history">
        <div class="history-header">
          <h2 class="history-title">History</h2>
          <button class="history-clear-btn" id="btn-clear-history" aria-label="Clear history" title="Clear all history">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
          </button>
        </div>
        <ul class="history-list" id="history-list" role="list" aria-live="polite">
          <li class="history-empty" id="history-empty">No history yet</li>
        </ul>
      </aside>

      <!-- main calculator card -->
      <div class="calculator-card" role="application" aria-label="Calculator">

        <!-- top bar -->
        <header class="calc-header">
          <span class="calc-brand">Calcify</span>
          <button class="history-toggle-btn" id="btn-history-toggle" aria-label="Toggle history panel" aria-expanded="false" aria-controls="history-panel" title="History">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </button>
        </header>

        <!-- display -->
        <section class="display" id="display" aria-live="polite" aria-atomic="true" aria-label="Calculator display">
          <div class="expression-row">
            <div id="expression" class="expression" aria-label="Current expression">0</div>
          </div>
          <div class="result-row">
            <div id="result" class="result" aria-label="Preview result"></div>
          </div>
        </section>

        <!-- keyboard hint -->
        <div class="kbd-hint" aria-label="Keyboard shortcuts available">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M6 8h.01M10 8h.01M14 8h.01M18 8h.01M8 12h.01M12 12h.01M16 12h.01M7 16h10"/></svg>
          <span>Keyboard supported</span>
        </div>

        <!-- button grid -->
        <section class="buttons" aria-label="Calculator buttons">

          <!-- row 1 -->
          <button id="btn-ac"  class="btn btn-utility span-two" data-action="ac"  aria-label="All clear">AC</button>
          <button id="btn-pct" class="btn btn-utility"          data-action="pct" aria-label="Percent">%</button>
          <button id="btn-div" class="btn btn-operator"         data-action="op"  data-op="÷" aria-label="Divide">÷</button>

          <!-- row 2 -->
          <button id="btn-7"   class="btn btn-number"           data-action="num" data-val="7" aria-label="7">7</button>
          <button id="btn-8"   class="btn btn-number"           data-action="num" data-val="8" aria-label="8">8</button>
          <button id="btn-9"   class="btn btn-number"           data-action="num" data-val="9" aria-label="9">9</button>
          <button id="btn-mul" class="btn btn-operator"         data-action="op"  data-op="×" aria-label="Multiply">×</button>

          <!-- row 3 -->
          <button id="btn-4"   class="btn btn-number"           data-action="num" data-val="4" aria-label="4">4</button>
          <button id="btn-5"   class="btn btn-number"           data-action="num" data-val="5" aria-label="5">5</button>
          <button id="btn-6"   class="btn btn-number"           data-action="num" data-val="6" aria-label="6">6</button>
          <button id="btn-sub" class="btn btn-operator"         data-action="op"  data-op="−" aria-label="Subtract">−</button>

          <!-- row 4 -->
          <button id="btn-1"   class="btn btn-number"           data-action="num" data-val="1" aria-label="1">1</button>
          <button id="btn-2"   class="btn btn-number"           data-action="num" data-val="2" aria-label="2">2</button>
          <button id="btn-3"   class="btn btn-number"           data-action="num" data-val="3" aria-label="3">3</button>
          <button id="btn-add" class="btn btn-operator"         data-action="op"  data-op="+" aria-label="Add">+</button>

          <!-- row 5 -->
          <button id="btn-sign" class="btn btn-number"          data-action="sign" aria-label="Toggle sign">+/−</button>
          <button id="btn-0"   class="btn btn-number"           data-action="num" data-val="0" aria-label="0">0</button>
          <button id="btn-dot" class="btn btn-number"           data-action="dot" aria-label="Decimal point">.</button>
          <button id="btn-eq"  class="btn btn-equals"           data-action="eq"  aria-label="Equals">=</button>

        </section>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
