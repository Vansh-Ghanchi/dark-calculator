<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <meta name="description" content="A simple calculator built with HTML, CSS and JavaScript." />
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wghtii@400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>

    <main class="calculator-wrapper">
      <div class="calculator">

        <!-- the screen that shows numbers -->
        <section class="display">
          <div id="expression" class="expression">0</div>
          <div id="result" class="result"></div>
        </section>

        <!-- all the buttons -->
        <section class="buttons">

          <button id="btn-ac"  class="btn btn-utility span-two" onclick="allClear()">AC</button>
          <button id="btn-c"   class="btn btn-utility"          onclick="clearLast()">C</button>
          <button id="btn-div" class="btn btn-operator"         onclick="inputOperator('÷')">÷</button>

          <button id="btn-7"   class="btn btn-number"           onclick="inputNumber('7')">7</button>
          <button id="btn-8"   class="btn btn-number"           onclick="inputNumber('8')">8</button>
          <button id="btn-9"   class="btn btn-number"           onclick="inputNumber('9')">9</button>
          <button id="btn-mul" class="btn btn-operator"         onclick="inputOperator('×')">×</button>

          <button id="btn-4"   class="btn btn-number"           onclick="inputNumber('4')">4</button>
          <button id="btn-5"   class="btn btn-number"           onclick="inputNumber('5')">5</button>
          <button id="btn-6"   class="btn btn-number"           onclick="inputNumber('6')">6</button>
          <button id="btn-sub" class="btn btn-operator"         onclick="inputOperator('−')">−</button>

          <button id="btn-1"   class="btn btn-number"           onclick="inputNumber('1')">1</button>
          <button id="btn-2"   class="btn btn-number"           onclick="inputNumber('2')">2</button>
          <button id="btn-3"   class="btn btn-number"           onclick="inputNumber('3')">3</button>
          <button id="btn-add" class="btn btn-operator"         onclick="inputOperator('+')">+</button>

          <button id="btn-0"   class="btn btn-number span-two"  onclick="inputNumber('0')">0</button>
          <button id="btn-dot" class="btn btn-number"           onclick="inputDecimal()">.</button>
          <button id="btn-eq"  class="btn btn-equals"           onclick="calculate()">=</button>

        </section>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
